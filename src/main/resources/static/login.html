<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión · Taller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=11">
</head>
<body>
<div class="login-wrap">
  <div class="wrap login-card">
    <div class="eyebrow">Taller · Acceso</div>
    <h1>Iniciar sesión</h1>
    <div class="sub">Introduce tus credenciales para entrar en la gestión del taller.</div>
    <div class="aviso error" id="avisoError">Usuario o contraseña incorrectos.</div>
    <form method="post" action="/login" class="bloque" id="formLogin">
      <div class="campo">
        <label for="username">Usuario</label>
        <input id="username" name="username" autocomplete="username" required autofocus>
      </div>
      <div class="campo">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <input type="hidden" name="_csrf" id="csrf">
      <div class="acciones">
        <button class="btn primario" type="submit">Entrar</button>
      </div>
    </form>
  </div>
</div>
<script>
  // El token CSRF llega en una cookie legible (XSRF-TOKEN); hay que copiarlo al
  // formulario porque esta página es HTML estático, sin motor de plantillas en el servidor.
  function leerCookie(nombre){
    const m = document.cookie.match(new RegExp("(^| )" + nombre + "=([^;]+)"));
    return m ? decodeURIComponent(m[2]) : null;
  }
  document.getElementById("csrf").value = leerCookie("XSRF-TOKEN") || "";
  if (new URLSearchParams(location.search).has("error")){
    document.getElementById("avisoError").classList.add("on");
  }
</script>
</body>
</html>
