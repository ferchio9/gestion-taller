# Configuración de la conexión a Oracle
# Los valores tras ":" son defaults para desarrollo local; en despliegue se sobrescriben
# con variables de entorno (DB_URL, DB_USER, DB_PASSWORD) sin tocar este fichero.
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USER:taller}
spring.datasource.password=${DB_PASSWORD:tallerwow}

# Indica a Spring Boot qué Driver usar
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuración de Hibernate (JPA) para que cree/actualice las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Usuario administrador que se crea automáticamente si la tabla usuario está vacía.
# En despliegue real, sobrescribe con la variable de entorno ADMIN_PASSWORD.
app.admin.usuario=${ADMIN_USER:admin}
app.admin.password=${ADMIN_PASSWORD:CambiaEstaClave123}