# Configuración de la conexión a Oracle
# Los valores tras ":" son placeholders que no funcionan contra nada real: define
# DB_URL/DB_USER/DB_PASSWORD como variables de entorno con tus valores reales
# antes de arrancar (ver README), sin tocar este fichero.
# DB_PASSWORD no tiene valor por defecto a propósito: sin definirla, la app no arranca
# en vez de conectarse con una contraseña trivial.
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USER:taller}
spring.datasource.password=${DB_PASSWORD}

# Indica a Spring Boot qué Driver usar
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Configuración de Hibernate (JPA) para que cree/actualice las tablas automáticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Usuario administrador que se crea automáticamente si la tabla usuario está vacía.
# ADMIN_PASSWORD no tiene valor por defecto a propósito: sin definirla, la app no arranca
# en vez de crear el admin con una contraseña trivial (ver README).
app.admin.usuario=${ADMIN_USER:admin}
app.admin.password=${ADMIN_PASSWORD}