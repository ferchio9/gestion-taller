# Solo para tests: base de datos H2 en memoria, para que "mvn test" no dependa
# de tener Oracle real en marcha. La app en si sigue usando Oracle (ver
# src/main/resources/application.properties).
spring.datasource.url=jdbc:h2:mem:testdb;MODE=Oracle;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

app.admin.usuario=admin
app.admin.password=admin12345678
