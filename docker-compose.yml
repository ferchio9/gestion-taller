services:
  oracle:
    image: gvenzl/oracle-xe:21-slim
    environment:
      ORACLE_PASSWORD: ${ORACLE_SYSTEM_PASSWORD:-changeme}
      APP_USER: taller
      APP_USER_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 20

  app:
    build: .
    depends_on:
      oracle:
        condition: service_healthy
    environment:
      DB_URL: jdbc:oracle:thin:@oracle:1521/XEPDB1
      DB_USER: taller
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
    ports:
      - "8080:8080"

volumes:
  oracle-data:
